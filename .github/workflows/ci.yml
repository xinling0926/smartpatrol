name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  PHP_VERSION: '8.1'

jobs:
  # ========================================
  # 測試階段
  # ========================================
  test:
    name: Test (PHP ${{ matrix.php-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        php-version: ['8.1', '8.2', '8.3']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: mbstring, intl, mysqli, pdo_mysql, gd, zip
          coverage: xdebug

      - name: Get Composer Cache Directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-suggest

      - name: Copy env file
        run: cp env .env

      - name: Set environment to testing
        run: |
          sed -i 's/# CI_ENVIRONMENT = production/CI_ENVIRONMENT = testing/' .env

      - name: Run PHPUnit tests
        run: vendor/bin/phpunit --testdox
        continue-on-error: true

      - name: PHP Code Sniffer
        run: |
          composer require --dev squizlabs/php_codesniffer --no-interaction
          vendor/bin/phpcs --standard=PSR12 app/Controllers app/Models --ignore=*/Views/* || true

  # ========================================
  # 建置階段
  # ========================================
  build:
    name: Build Release
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, intl, mysqli, pdo_mysql, gd, zip

      - name: Install dependencies (production)
        run: composer install --prefer-dist --no-dev --optimize-autoloader

      - name: Create release archive
        run: |
          VERSION=$(date +%Y%m%d_%H%M%S)
          mkdir -p release
          tar -czf release/smartpatrol-${VERSION}.tar.gz \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='tests' \
            --exclude='writable/cache/*' \
            --exclude='writable/logs/*' \
            --exclude='writable/session/*' \
            --exclude='writable/debugbar/*' \
            --exclude='.env' \
            --exclude='*.sh' \
            .
          echo "RELEASE_VERSION=${VERSION}" >> $GITHUB_ENV

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: smartpatrol-release
          path: release/
          retention-days: 30

  # ========================================
  # 部署到測試環境
  # ========================================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment:
      name: staging
      url: https://staging.your-domain.com

    steps:
      - name: Download release artifact
        uses: actions/download-artifact@v4
        with:
          name: smartpatrol-release
          path: release/

      - name: Deploy to staging server
        env:
          SSH_PRIVATE_KEY: ${{ secrets.STAGING_SSH_KEY }}
          SERVER_HOST: ${{ secrets.STAGING_HOST }}
          SERVER_USER: ${{ secrets.STAGING_USER }}
          SERVER_PATH: ${{ secrets.STAGING_PATH }}
        run: |
          echo "Deploying to staging server..."
          # 設定 SSH
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H $SERVER_HOST >> ~/.ssh/known_hosts 2>/dev/null

          # 上傳並解壓
          RELEASE_FILE=$(ls release/*.tar.gz | head -1)
          scp $RELEASE_FILE ${SERVER_USER}@${SERVER_HOST}:/tmp/

          ssh ${SERVER_USER}@${SERVER_HOST} << 'ENDSSH'
            cd ${SERVER_PATH}
            RELEASE_NAME=$(date +%Y%m%d_%H%M%S)
            mkdir -p releases/${RELEASE_NAME}
            tar -xzf /tmp/*.tar.gz -C releases/${RELEASE_NAME}
            rm /tmp/*.tar.gz

            # 建立 symbolic links
            ln -sf ${SERVER_PATH}/shared/.env releases/${RELEASE_NAME}/.env
            ln -sf ${SERVER_PATH}/shared/writable releases/${RELEASE_NAME}/writable
            ln -sf ${SERVER_PATH}/shared/data releases/${RELEASE_NAME}/public/data

            # 切換版本
            rm -f current
            ln -s releases/${RELEASE_NAME} current

            # 清除快取
            rm -rf shared/writable/cache/*

            # 執行遷移
            cd current && php spark migrate --all

            # 清理舊版本
            cd ${SERVER_PATH}/releases && ls -1t | tail -n +6 | xargs -r rm -rf
          ENDSSH

          echo "Staging deployment completed!"

  # ========================================
  # 部署到正式環境 (需手動核准)
  # ========================================
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://your-domain.com

    steps:
      - name: Download release artifact
        uses: actions/download-artifact@v4
        with:
          name: smartpatrol-release
          path: release/

      - name: Deploy to production server
        env:
          SSH_PRIVATE_KEY: ${{ secrets.PRODUCTION_SSH_KEY }}
          SERVER_HOST: ${{ secrets.PRODUCTION_HOST }}
          SERVER_USER: ${{ secrets.PRODUCTION_USER }}
          SERVER_PATH: ${{ secrets.PRODUCTION_PATH }}
        run: |
          echo "Deploying to production server..."
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H $SERVER_HOST >> ~/.ssh/known_hosts 2>/dev/null

          RELEASE_FILE=$(ls release/*.tar.gz | head -1)
          scp $RELEASE_FILE ${SERVER_USER}@${SERVER_HOST}:/tmp/

          ssh ${SERVER_USER}@${SERVER_HOST} << 'ENDSSH'
            cd ${SERVER_PATH}
            RELEASE_NAME=$(date +%Y%m%d_%H%M%S)
            mkdir -p releases/${RELEASE_NAME}
            tar -xzf /tmp/*.tar.gz -C releases/${RELEASE_NAME}
            rm /tmp/*.tar.gz

            ln -sf ${SERVER_PATH}/shared/.env releases/${RELEASE_NAME}/.env
            ln -sf ${SERVER_PATH}/shared/writable releases/${RELEASE_NAME}/writable
            ln -sf ${SERVER_PATH}/shared/data releases/${RELEASE_NAME}/public/data

            rm -f current
            ln -s releases/${RELEASE_NAME} current

            rm -rf shared/writable/cache/*
            cd current && php spark migrate --all
            cd ${SERVER_PATH}/releases && ls -1t | tail -n +6 | xargs -r rm -rf
          ENDSSH

          echo "Production deployment completed!"
